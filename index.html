<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>WeatherApp</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<script src="script.js" defer></script>
</head>
<body class="weather_app">
	<header class="weather_app_header">
		<div class="sign">
			<h1>WeatherApp</h1>
		</div>
	</header>
	<main class="weather_app_main">
		<section class="section_get_weather">
			<div class="container_input">
				<label for="city">Type here your town:</label>
				<input type="text" id="city" placeholder="Wrocław" />
			</div>
			<button class="get_weather">GET WEATHER</button>
			<div class="result">
				<p class="temperature"></p>
				<p class="wind_speed"></p>
			</div>
		</section>
	</main>
	<footer class="weather_app_footer">
		<div class="container_link">
			<a href="https://github.com/yungost">My GitHub</a>
		</div>
	</footer>
</body>
</html>
